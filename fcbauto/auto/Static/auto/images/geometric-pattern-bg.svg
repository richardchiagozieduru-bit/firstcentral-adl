<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <pattern id="geometricPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Orange circles -->
      <circle cx="25" cy="25" r="20" fill="#FF6B35"/>
      <circle cx="75" cy="75" r="15" fill="#F7931E"/>
      
      <!-- Navy triangles -->
      <polygon points="0,0 25,0 12.5,21.65" fill="#2C3E50"/>
      <polygon points="75,25 100,25 87.5,46.65" fill="#34495E"/>
      
      <!-- Yellow squares -->
      <rect x="50" y="0" width="20" height="20" fill="#FFC72C"/>
      <rect x="0" y="50" width="15" height="15" fill="#FFD700"/>
      
      <!-- Cream shapes -->
      <ellipse cx="25" cy="75" rx="12" ry="8" fill="#F5E6D3"/>
      <rect x="60" y="60" width="25" height="10" fill="#EDE0D5"/>
    </pattern>
  </defs>
  
  <!-- Background with geometric pattern -->
  <rect width="100%" height="100%" fill="url(#geometricPattern)" opacity="0.1"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#F5E6D3;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#EDE0D5;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
</svg>